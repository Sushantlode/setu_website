name: Deploy to GoDaddy (setuai.com)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_slate:
        description: "Delete all files in public_html/setuai.com before deploy (first-time full replace)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-setuai-com
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate FTP server hostname
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          trimmed=$(echo "$FTP_SERVER" | tr -d '[:space:]')
          if [ -z "$trimmed" ]; then
            echo "::error::FTP_SERVER secret is empty"
            exit 1
          fi
          case "$trimmed" in
            ftp://*|ftps://*|http://*|https://*)
              echo "::error::FTP_SERVER must be a hostname or IP only — remove ftp:// or https://"
              exit 1
              ;;
            ftp.setuai.com)
              echo "::error::ftp.setuai.com does not exist in DNS. Use 184.168.116.6"
              exit 1
              ;;
          esac
          echo "OK: FTP_SERVER is set ($trimmed)"

      - name: Prepare FTP credentials
        env:
          FTP_SERVER_RAW: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME_RAW: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD_RAW: ${{ secrets.FTP_PASSWORD }}
        run: |
          trim() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          server=$(trim "$FTP_SERVER_RAW")
          user=$(trim "$FTP_USERNAME_RAW")
          pass=$(trim "$FTP_PASSWORD_RAW")
          if [ -z "$server" ] || [ -z "$user" ] || [ -z "$pass" ]; then
            echo "::error::FTP_SERVER, FTP_USERNAME, and FTP_PASSWORD must be non-empty"
            exit 1
          fi
          echo "FTP_SERVER=$server" >> "$GITHUB_ENV"
          echo "FTP_USERNAME=$user" >> "$GITHUB_ENV"
          {
            echo "FTP_PASSWORD<<EOF"
            printf '%s' "$pass"
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "Prepared FTP credentials for user: $user @ $server"

      - name: Check required secrets
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD SMTP_PASS; do
            case "$name" in
              FTP_SERVER) val="${{ secrets.FTP_SERVER }}" ;;
              FTP_USERNAME) val="${{ secrets.FTP_USERNAME }}" ;;
              FTP_PASSWORD) val="${{ secrets.FTP_PASSWORD }}" ;;
              SMTP_PASS) val="${{ secrets.SMTP_PASS }}" ;;
            esac
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub secret: $name — add it under Settings → Secrets and variables → Actions"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          if [ -n "${{ secrets.FTP_SERVER_DIR }}" ]; then
            echo "::warning::FTP_SERVER_DIR secret is set but ignored. Delete it from GitHub Secrets — deploy always uses public_html/setuai.com/"
          fi

      - name: Test FTP login (setuai.com folder)
        run: |
          echo "Testing FTPS login and public_html/setuai.com access..."
          if ! curl -k --ssl-reqd --connect-timeout 30 --fail-with-body \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER:21/public_html/setuai.com/" \
            -l | head -10; then
            echo ""
            echo "::error::FTP login failed (530). Fix GitHub Secrets on THIS repo:"
            echo "  Settings → Secrets and variables → Actions"
            echo "  Required: FTP_SERVER=184.168.116.6, FTP_USERNAME (cPanel login), FTP_PASSWORD (cPanel password)"
            echo "  Secrets do NOT copy when you move or fork the repo — re-add them on Sushantlode/setu_website."
            exit 1
          fi
          echo "OK: FTP credentials work for public_html/setuai.com/"

      - name: Generate PHP config from secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SITE_NAME: SETU
          CONTACT_DAILY_LIMIT: ${{ secrets.CONTACT_DAILY_LIMIT }}
          ALLOWED_ORIGINS: https://setuai.com,https://www.setuai.com
          STAGING_API_BASE: ${{ secrets.STAGING_API_BASE || 'https://staging.setuai.com' }}
        run: node scripts/generate-config-php.mjs

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ""
          VITE_CONTACT_API_URL: ""

      - name: Verify dist before deploy
        run: |
          if [ ! -f dist/api/config.php ]; then
            echo "::error::dist/api/config.php missing after build"
            exit 1
          fi
          if [ ! -f dist/api/staging-proxy.php ]; then
            echo "::error::dist/api/staging-proxy.php missing after build"
            exit 1
          fi
          if [ ! -f dist/.htaccess ]; then
            echo "::error::dist/.htaccess missing after build"
            exit 1
          fi
          if ! grep -q 'staging-proxy.php' dist/.htaccess; then
            echo "::error::dist/.htaccess missing staging-proxy rewrite rules"
            exit 1
          fi
          echo "Deploying $(find dist -type f | wc -l) files to public_html/setuai.com/"
          du -sh dist

      - name: Deploy to GoDaddy via FTPS
        env:
          CLEAN_SLATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean_slate == 'true' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          echo "Deploying dist/ → public_html/setuai.com/ (clean_slate=$CLEAN_SLATE)"
          export HOME="$RUNNER_TEMP"
          NETRC="$HOME/.netrc"
          printf 'machine %s\nlogin %s\npassword %s\n' \
            "$FTP_SERVER" "$FTP_USERNAME" "$FTP_PASSWORD" > "$NETRC"
          chmod 600 "$NETRC"
          DELETE_OPT=""
          if [ "$CLEAN_SLATE" = "true" ]; then
            DELETE_OPT="--delete"
          fi
          lftp "ftps://$FTP_SERVER:21" <<LFTP_EOF
          set ssl:verify-certificate no
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set cmd:fail-exit yes
          cd public_html/setuai.com
          lcd ./dist
          mirror -R --parallel=4 --verbose $DELETE_OPT \
            --exclude-glob .git* \
            --exclude-glob **/node_modules/** \
            --exclude-glob **/assets/public/khatima/originals/** \
            --exclude-glob DEPLOY-CHECKLIST.txt
          bye
          LFTP_EOF
          rm -f "$NETRC"
          echo "OK: FTPS upload finished"

      - name: Verify live site
        run: |
          echo "Waiting for hosting to pick up changes..."
          sleep 20
          EXPECTED_JS=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          echo "Expected bundle: $EXPECTED_JS"
          for i in 1 2 3 4 5 6 8 10; do
            HEALTH=$(curl -sf "https://setuai.com/api/health.php" || true)
            if echo "$HEALTH" | grep -q '"ok":true'; then
              LIVE_JS=$(curl -sf "https://setuai.com/" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1)
              echo "Live JS: $LIVE_JS"
              if [ -n "$EXPECTED_JS" ] && [ "$LIVE_JS" = "$EXPECTED_JS" ]; then
                echo "OK: https://setuai.com/ serves $LIVE_JS"
                MANIFEST=$(curl -sf "https://setuai.com/assets/public/khatima/manifest.json" | head -c 1 || true)
                if [ "$MANIFEST" = "{" ]; then
                  echo "OK: khatima manifest deployed"
                else
                  echo "::warning::khatima manifest missing — upload public/assets/public/khatima/ if field photos do not load"
                fi
                exit 0
              fi
            fi
            echo "Attempt $i — waiting for deploy..."
            sleep 20
          done
          echo "::error::Deploy finished but https://setuai.com/ still serves an old bundle (expected $EXPECTED_JS)"
          curl -sf "https://setuai.com/" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || true
          exit 1

      - name: Deployment summary
        run: |
          echo "Deployed to https://setuai.com (public_html/setuai.com/)"
          echo "Health check: https://setuai.com/api/health.php"
          echo "nkginternational.com is NOT modified by this workflow"
