name: Deploy to GoDaddy (setuai.com)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_slate:
        description: "Delete all files in public_html before deploy (first-time full replace)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-setuai-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate FTP server hostname
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          trimmed=$(echo "$FTP_SERVER" | tr -d '[:space:]')
          if [ -z "$trimmed" ]; then
            echo "::error::FTP_SERVER secret is empty"
            exit 1
          fi
          case "$trimmed" in
            ftp://*|ftps://*|http://*|https://*)
              echo "::error::FTP_SERVER must be a hostname or IP only — remove ftp:// or https://"
              exit 1
              ;;
            ftp.setuai.com)
              echo "::error::ftp.setuai.com does not exist in DNS. Set FTP_SERVER to setuai.com or 118.139.180.79"
              exit 1
              ;;
          esac
          if ! getent hosts "$trimmed" > /dev/null; then
            echo "::error::FTP_SERVER cannot be resolved (ENOTFOUND). Set it to setuai.com or 118.139.180.79"
            exit 1
          fi
          echo "OK: FTP_SERVER resolves"

      - name: Check required secrets
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD SMTP_PASS; do
            case "$name" in
              FTP_SERVER) val="${{ secrets.FTP_SERVER }}" ;;
              FTP_USERNAME) val="${{ secrets.FTP_USERNAME }}" ;;
              FTP_PASSWORD) val="${{ secrets.FTP_PASSWORD }}" ;;
              SMTP_PASS) val="${{ secrets.SMTP_PASS }}" ;;
            esac
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub secret: $name — add it under Settings → Secrets and variables → Actions"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Generate PHP config from secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SITE_NAME: SETU
          CONTACT_DAILY_LIMIT: ${{ secrets.CONTACT_DAILY_LIMIT }}
          ALLOWED_ORIGINS: https://setuai.com,https://www.setuai.com
        run: node scripts/generate-config-php.mjs

      - name: Build production bundle
        run: npm run build

      - name: Verify config.php in dist
        run: |
          if [ ! -f dist/api/config.php ]; then
            echo "::error::dist/api/config.php missing after build"
            exit 1
          fi
          echo "OK: dist/api/config.php ready for deploy"

      - name: Test FTP connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Testing FTP login to $FTP_SERVER ..."
          curl --silent --show-error --fail-with-body \
            --ssl-reqd \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER:21/" \
            -l || {
              echo "::warning::FTPS list failed, trying plain FTP..."
              curl --silent --show-error --fail-with-body \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                "ftp://$FTP_SERVER:21/" \
                -l
            }
          echo "FTP login OK"

      - name: Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: public_html/
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean_slate == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            DEPLOY-CHECKLIST.txt
          log-level: verbose

      - name: Deployment summary
        run: |
          echo "Deployed to https://setuai.com"
          echo "Health check: https://setuai.com/api/health"
