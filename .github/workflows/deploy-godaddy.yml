name: Deploy to GoDaddy (setuai.com)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_slate:
        description: "Delete all files in public_html/setuai.com before deploy (first-time full replace)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-setuai-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate FTP server hostname
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          trimmed=$(echo "$FTP_SERVER" | tr -d '[:space:]')
          if [ -z "$trimmed" ]; then
            echo "::error::FTP_SERVER secret is empty"
            exit 1
          fi
          case "$trimmed" in
            ftp://*|ftps://*|http://*|https://*)
              echo "::error::FTP_SERVER must be a hostname or IP only — remove ftp:// or https://"
              exit 1
              ;;
            ftp.setuai.com)
              echo "::error::ftp.setuai.com does not exist in DNS. Use 184.168.116.6"
              exit 1
              ;;
          esac
          echo "OK: FTP_SERVER is set ($trimmed)"

      - name: Check required secrets
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD SMTP_PASS; do
            case "$name" in
              FTP_SERVER) val="${{ secrets.FTP_SERVER }}" ;;
              FTP_USERNAME) val="${{ secrets.FTP_USERNAME }}" ;;
              FTP_PASSWORD) val="${{ secrets.FTP_PASSWORD }}" ;;
              SMTP_PASS) val="${{ secrets.SMTP_PASS }}" ;;
            esac
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub secret: $name — add it under Settings → Secrets and variables → Actions"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          if [ -n "${{ secrets.FTP_SERVER_DIR }}" ]; then
            echo "::warning::FTP_SERVER_DIR secret is set but ignored. Delete it from GitHub Secrets — deploy always uses public_html/setuai.com/"
          fi

      - name: Test FTP login (setuai.com folder)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Testing FTPS login and public_html/setuai.com access..."
          curl -k --ssl-reqd --connect-timeout 30 --fail-with-body \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER:21/public_html/setuai.com/" \
            -l | head -10
          echo "OK: FTP credentials work for public_html/setuai.com/"

      - name: Generate PHP config from secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SITE_NAME: SETU
          CONTACT_DAILY_LIMIT: ${{ secrets.CONTACT_DAILY_LIMIT }}
          ALLOWED_ORIGINS: https://setuai.com,https://www.setuai.com
          STAGING_API_BASE: ${{ secrets.STAGING_API_BASE || 'https://staging.setuai.com' }}
        run: node scripts/generate-config-php.mjs

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ""
          VITE_CONTACT_API_URL: ""

      - name: Verify dist before deploy
        run: |
          if [ ! -f dist/api/config.php ]; then
            echo "::error::dist/api/config.php missing after build"
            exit 1
          fi
          if [ ! -f dist/api/staging-proxy.php ]; then
            echo "::error::dist/api/staging-proxy.php missing after build"
            exit 1
          fi
          if [ ! -f dist/.htaccess ]; then
            echo "::error::dist/.htaccess missing after build"
            exit 1
          fi
          if ! grep -q 'staging-proxy.php' dist/.htaccess; then
            echo "::error::dist/.htaccess missing staging-proxy rewrite rules"
            exit 1
          fi
          echo "Deploying $(find dist -type f | wc -l) files to public_html/setuai.com/"
          du -sh dist

      - name: Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          local-dir: ./dist/
          # Hardcoded — nkginternational.com uses public_html/ (must never deploy there)
          server-dir: public_html/setuai.com/
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean_slate == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            DEPLOY-CHECKLIST.txt
          log-level: verbose

      - name: Verify live site
        run: |
          echo "Waiting for CDN/hosting to pick up changes..."
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf "https://setuai.com/api/health" | grep -q '"ok":true'; then
              echo "OK: https://setuai.com/api/health"
              curl -sfI "https://setuai.com/" | head -5
              exit 0
            fi
            echo "Attempt $i failed — retrying in 15s..."
            sleep 15
          done
          echo "::error::Deploy finished but https://setuai.com/api/health did not return ok:true"
          curl -s "https://setuai.com/api/health" || true
          exit 1

      - name: Deployment summary
        run: |
          echo "Deployed to https://setuai.com (public_html/setuai.com/)"
          echo "Health check: https://setuai.com/api/health"
          echo "nkginternational.com is NOT modified by this workflow"
